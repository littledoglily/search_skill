<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
window.ai_edge_gallery_get_result = async function(params, secret) {
  const query = params.query || "";
  const count = params.count || 10;
  const apiKey = secret || "";

  if (!apiKey) {
    return JSON.stringify({ error_code: 401, error_msg: "No API key provided." });
  }
  if (!query) {
    return JSON.stringify({ error_code: 400, error_msg: "No search query provided." });
  }

  const body = {
    query: query,
    count: count,
    filters: {
      sites: {
        include: params.include_sites || [],
        exclude: params.exclude_sites || []
      },
      timeRange: {
        date: params.time_range || ""
      },
      geo: {
        countries: {
          include: params.countries || []
        }
      },
      languages: {
        include: params.languages || []
      }
    }
  };

  try {
    const response = await fetch("https://api.querit.ai/v1/search", {
      method: "POST",
      mode: "cors",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + apiKey
      },
      body: JSON.stringify(body)
    });

    if (!response.ok) {
      return JSON.stringify({
        error_code: response.status,
        error_msg: "HTTP error: " + response.status
      });
    }

    const data = await response.json();
    return JSON.stringify(data);

  } catch (err) {
    return JSON.stringify({
      error_code: 500,
      error_msg: "Network error: " + err.message
    });
  }
};
</script>
</body>
</html>
